<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Pagefind Hub - Default UI</title>
		<link rel="stylesheet" href="/style.css">
		<link rel="stylesheet" href="/pagefind/pagefind-ui.css">
		<script src="/pagefind/pagefind-ui.js"></script>
	</head>
	<body>
		<header>
			<a href="/" class="back-link">&larr; Back to home</a>
			<h1>Default UI Example</h1>
			<p>Using the Pagefind Default UI.</p>
		</header>

		<main>
			<div id="search"></div>
			<script type="module">
			import { observePagefind } from "/ui.mjs";

			window.addEventListener("DOMContentLoaded", () => {
				new PagefindUI({
					element: "#search",
					showSubResults: true,
				});
				observePagefind();
			});
			</script>
		</main>
	</body>
</html>
