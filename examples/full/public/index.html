<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagefind Hub - Full Example</title>
    <link rel="stylesheet" href="/pagefind/pagefind-ui.css">
    <script src="/pagefind/pagefind-ui.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6; }
        header { border-bottom: 1px solid #eee; margin-bottom: 2rem; }
        .info { background: #f9f9f9; padding: 1rem; border-left: 4px solid #0070f3; margin-bottom: 2rem; }
    </style>
</head>
<body>
    <header>
        <h1>Pagefind Hub: Full Configuration</h1>
        <p>A comprehensive search experience indexing multiple platforms.</p>
    </header>

    <main>
        <div class="info">
            This example indexes:
            <ul>
                <li>Local HTML files (common content)</li>
                <li>Recent posts from <strong>Bluesky</strong></li>
                <li>Videos from a <strong>YouTube</strong> channel</li>
            </ul>
        </div>

        <p>Enter a query below to search across all these sources instantly.</p>
        
        <div id="search"></div>
        <script>
            window.addEventListener('DOMContentLoaded', (event) => {
                new PagefindUI({ 
                    element: "#search", 
                    showSubResults: true 
                });
            });
        </script>
    </main>
</body>
</html>
